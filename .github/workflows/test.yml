name: Bun CompressionStream Repro

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bun_test:
    runs-on: ubuntu-latest
    # Job-level ceiling: kills the job if Bun's process scheduler itself
    # deadlocks (which would defeat the per-test --timeout flag).
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: antongolub/action-setup-bun@v1.13.2
        with:
          bun-version: v1.x

      - name: Print Bun version
        run: bun --version

      - name: Install JSR dependencies
        run: bun x jsr add @cross/test @std/assert

      - name: Run tests
        # --timeout 10000: per-test 10 s limit so that a Bun CompressionStream
        # deadlock surfaces as "timed out" rather than hanging the CI job forever.
        # Assertion failures (the fast-fail case) still report in < 5 ms.
        run: bun test --timeout 10000
