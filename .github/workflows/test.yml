name: Bun CompressionStream Repro

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bun_test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      # Same setup as cross-org/workflows bun-ci.yml
      - uses: antongolub/action-setup-bun@v1.13.2
        with:
          bun-version: v1.x

      - name: Print Bun version
        run: bun --version

      # Same JSR dependencies as cross-org/image CI
      - name: Install JSR dependencies
        run: bun x jsr add @cross/test @cross/fs @cross/dir @std/assert @std/path

      # Plain `bun test` — no --timeout flag, matching cross-org/image CI exactly
      - name: Run tests
        run: bun test
